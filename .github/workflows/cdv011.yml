name: Java CI
on:
 push:
  branches: [main]
 pull_request:
  branches: [main]
jobs:
 build:
  name: Build and Run
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
   - name: Setup JDK 17
     uses: actions/setup-java@v3
     with:
      distribution: 'temurin'
      java-version: '17'
   - name: Compile Java code
     run: javac*.java
   - name: Run Java program
     run: java cdv011
  
